name: TLD Stats Update

on:
  schedule:
    - cron: '0 0 * * *' # Every day at 6:00 AM BDT (00:00 UTC)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run update script
        run: python tld_stats.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update TLD statistics [skip ci]"
            git push
          else
            echo "No changes in TLD statistics."
          fi
